app:
  imagePullPolicy: "IfNotPresent"
  replicas: 1
  customCommand: []
  customArgs: []
  env: []

resources:
  cpu: "10m"
  memory: "128Mi"

initContainers: []

podAnnotations: {}
podLabels: {}

probes:
  readiness: {}
  liveness: {}

schedule:
  topologySpreadConstraints: []
  affinity: {}
  tolerations: []

service:
  enabled: false
  port: 80

rbac:
  enabled: false
  roleBinding:
    autoCreate: true
    additionalRoles: []
    additionalClusterRoles: []
  clusterRoleBinding:
    clusterRoles: []

ingress:
  enabled: false
  className: nginx
  host: ""
  path: ""
  pathType: Prefix

volumes: []
volumeMounts: []

securityContext:
  runAsUser: 1000